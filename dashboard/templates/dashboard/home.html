{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-3xl font-semibold">HomeLab Overview</h2>

    {% if user.is_authenticated %}
        <div class="flex items-center space-x-4">
            <span class="text-gray-300">
                Logged in as <span class="font-semibold">{{ user.username }}</span>
            </span>
            <a href="{% url 'account_logout' %}"
               class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition">
               Logout
            </a>
        </div>
    {% endif %}
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

    <div id="card-k8s" data-url="{% url 'card_k8s' %}" class="bg-gray-800 rounded-2xl shadow p-6">
        <div class="animate-pulse space-y-3">
            <div class="h-6 bg-gray-700 rounded w-3/4"></div>
            <div class="h-4 bg-gray-700 rounded w-full"></div>
            <div class="h-4 bg-gray-700 rounded w-5/6"></div>
            <div class="h-20 bg-gray-700 rounded w-full"></div>
            <div class="h-4 bg-gray-700 rounded w-2/3"></div>
        </div>
    </div>

    <div id="card-synology" data-url="{% url 'card_synology' %}" class="bg-gray-800 rounded-2xl shadow p-6">
        <div class="animate-pulse space-y-3">
            <div class="h-6 bg-gray-700 rounded w-3/4"></div>
            <div class="h-4 bg-gray-700 rounded w-full"></div>
            <div class="h-4 bg-gray-700 rounded w-5/6"></div>
            <div class="h-20 bg-gray-700 rounded w-full"></div>
            <div class="h-4 bg-gray-700 rounded w-2/3"></div>
        </div>
    </div>

    <div class="flex flex-col gap-6">
        <div id="card-claude" data-url="{% url 'card_claude' %}" class="bg-gray-800 rounded-2xl shadow p-6">
            <div class="animate-pulse space-y-3">
                <div class="h-6 bg-gray-700 rounded w-1/2"></div>
                <div class="h-36 bg-gray-700 rounded w-full"></div>
                <div class="h-4 bg-gray-700 rounded w-1/3"></div>
                <div class="h-40 bg-gray-700 rounded w-full"></div>
            </div>
        </div>
        <div id="card-aws-billing" data-url="{% url 'card_aws_billing' %}" class="bg-gray-800 rounded-2xl shadow p-6">
            <div class="animate-pulse space-y-3">
                <div class="h-6 bg-gray-700 rounded w-1/2"></div>
                <div class="h-16 bg-gray-700 rounded w-full"></div>
                <div class="h-4 bg-gray-700 rounded w-full"></div>
                <div class="h-4 bg-gray-700 rounded w-4/5"></div>
            </div>
        </div>
    </div>

    <div id="card-network" data-url="{% url 'card_network' %}" class="bg-gray-800 rounded-2xl shadow p-6">
        <div class="animate-pulse space-y-3">
            <div class="h-6 bg-gray-700 rounded w-1/2"></div>
            <div class="h-16 bg-gray-700 rounded w-full"></div>
            <div class="h-4 bg-gray-700 rounded w-full"></div>
            <div class="h-4 bg-gray-700 rounded w-5/6"></div>
            <div class="h-4 bg-gray-700 rounded w-4/6"></div>
        </div>
    </div>

    <!-- To Do Card (already AJAX — no lazy loading needed) -->
    <div class="bg-gray-800 rounded-2xl shadow p-6" id="todo-card">
        <h3 class="text-xl font-bold mb-4 flex justify-between items-center">
            <span>To Do</span>
            <span id="todo-count" class="text-sm text-gray-400"></span>
        </h3>

        <div id="todo-list" class="mb-4 space-y-1 max-h-80 overflow-y-auto">
            <p class="text-gray-400 text-sm" id="todo-loading">Loading...</p>
        </div>

        <form id="todo-add-form" class="flex gap-2 mt-4">
            {% csrf_token %}
            <input type="text" id="todo-new-task" placeholder="Add a task..."
                   class="flex-1 bg-gray-700 text-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                Add
            </button>
        </form>
    </div>

    <div id="card-emporia-chart" data-url="{% url 'card_emporia_chart' %}" class="bg-gray-800 rounded-2xl shadow p-6" style="min-height: 24rem;">
        <div class="animate-pulse space-y-3">
            <div class="h-6 bg-gray-700 rounded w-3/4"></div>
            <div class="h-64 bg-gray-700 rounded w-full"></div>
        </div>
    </div>

    <div id="card-emporia-daily" data-url="{% url 'card_emporia_daily' %}" class="bg-gray-800 rounded-2xl shadow p-6">
        <div class="animate-pulse space-y-3">
            <div class="h-6 bg-gray-700 rounded w-2/3"></div>
            <div class="h-4 bg-gray-700 rounded w-full"></div>
            <div class="h-4 bg-gray-700 rounded w-5/6"></div>
            <div class="h-4 bg-gray-700 rounded w-full"></div>
            <div class="h-4 bg-gray-700 rounded w-4/5"></div>
        </div>
    </div>

    <div id="card-splunk" data-url="{% url 'card_splunk' %}" class="bg-gray-800 rounded-2xl shadow p-6">
        <div class="animate-pulse space-y-3">
            <div class="h-6 bg-gray-700 rounded w-2/3"></div>
            <div class="flex items-center gap-1 text-xs text-gray-500">
                <svg class="animate-spin h-3 w-3 text-blue-400 mr-1" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 5.373 0 0 12h4z"></path>
                </svg>
                Querying Splunk...
            </div>
            <div class="h-4 bg-gray-700 rounded w-full"></div>
            <div class="h-4 bg-gray-700 rounded w-5/6"></div>
            <div class="h-4 bg-gray-700 rounded w-full"></div>
            <div class="h-4 bg-gray-700 rounded w-3/4"></div>
        </div>
    </div>

    <div id="card-weather" data-url="{% url 'card_weather' %}" class="bg-gray-800 rounded-2xl shadow p-6">
        <div class="animate-pulse space-y-3">
            <div class="h-6 bg-gray-700 rounded w-1/2"></div>
            <div class="h-24 bg-gray-700 rounded w-full"></div>
            <div class="h-16 bg-gray-700 rounded w-full"></div>
            <div class="h-4 bg-gray-700 rounded w-full"></div>
            <div class="h-4 bg-gray-700 rounded w-5/6"></div>
        </div>
    </div>


</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script src="{% static 'dashboard/dashboard.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    async function loadCard(id) {
        const el = document.getElementById(id);
        if (!el || !el.dataset.url) return;
        const url = el.dataset.url;
        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(resp.statusText);
            const html = await resp.text();
            // Insert card HTML (scripts don't execute via template/replaceWith)
            const tmpl = document.createElement('template');
            tmpl.innerHTML = html;
            el.replaceWith(tmpl.content.cloneNode(true));
            // Execute any scripts from the injected card
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            doc.querySelectorAll('script').forEach(function(s) {
                const ns = document.createElement('script');
                ns.textContent = s.textContent;
                document.body.appendChild(ns);
            });
        } catch(e) {
            el.innerHTML = '<p class="text-red-400 text-sm p-2">Failed to load.</p>';
            el.classList.remove('animate-pulse');
        }
    }

    ['card-aws-billing', 'card-claude', 'card-k8s', 'card-synology', 'card-network',
     'card-emporia-chart', 'card-emporia-daily', 'card-splunk', 'card-weather'].forEach(loadCard);
});
</script>
<script>
    setInterval(function() { window.location.reload(); }, 120000);
</script>
<script>
(function() {
    const CSRF = document.querySelector('[name=csrfmiddlewaretoken]').value;

    function priorityBadge(priority) {
        const map = {
            urgent: 'bg-red-700 text-white',
            high:   'bg-yellow-600 text-gray-900',
            medium: 'bg-blue-700 text-white',
            low:    'bg-gray-600 text-gray-200',
        };
        const cls = map[priority] || map.medium;
        return `<span class="text-xs px-2 py-0.5 rounded font-semibold ${cls}">${priority}</span>`;
    }

    function updateCount() {
        const n = document.querySelectorAll('#todo-list [id^="todo-task-"]').length;
        document.getElementById('todo-count').textContent = n ? `${n} open` : '';
    }

    function renderTasks(tasks) {
        const list = document.getElementById('todo-list');
        if (!tasks.length) {
            list.innerHTML = '<p class="text-gray-400 text-sm">No open tasks.</p>';
            document.getElementById('todo-count').textContent = '';
            return;
        }
        list.innerHTML = tasks.map(t => `
            <div class="flex items-start justify-between gap-2 py-2 border-b border-gray-700" id="todo-task-${t.id}">
                <div class="flex flex-col min-w-0">
                    <span class="text-sm ${t.is_overdue ? 'text-red-400' : 'text-gray-100'}">${t.title}</span>
                    ${t.due_date ? `<span class="text-xs text-gray-500">${t.is_overdue ? '&#9888; ' : ''}Due ${t.due_date}</span>` : ''}
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    ${priorityBadge(t.priority)}
                    <button onclick="todoComplete(${t.id})"
                            class="bg-green-700 hover:bg-green-600 text-white text-xs px-2 py-1 rounded transition">
                        Done
                    </button>
                </div>
            </div>
        `).join('');
        updateCount();
    }

    async function loadTasks() {
        try {
            const resp = await fetch('/todo/tasks/');
            const tasks = await resp.json();
            renderTasks(Array.isArray(tasks) ? tasks : []);
        } catch (e) {
            document.getElementById('todo-list').innerHTML = '<p class="text-red-400 text-sm">Failed to load tasks.</p>';
        }
    }

    window.todoComplete = async function(taskId) {
        const el = document.getElementById(`todo-task-${taskId}`);
        if (el) el.style.opacity = '0.4';
        try {
            await fetch(`/todo/tasks/${taskId}/complete/`, {
                method: 'POST',
                headers: {'X-CSRFToken': CSRF},
            });
            if (el) el.remove();
            const remaining = document.querySelectorAll('#todo-list [id^="todo-task-"]').length;
            if (!remaining) {
                document.getElementById('todo-list').innerHTML = '<p class="text-gray-400 text-sm">No open tasks.</p>';
                document.getElementById('todo-count').textContent = '';
            } else {
                updateCount();
            }
        } catch (e) {
            if (el) el.style.opacity = '1';
        }
    };

    document.getElementById('todo-add-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const input = document.getElementById('todo-new-task');
        const title = input.value.trim();
        if (!title) return;
        input.disabled = true;
        try {
            await fetch('/todo/tasks/', {
                method: 'POST',
                headers: {'X-CSRFToken': CSRF, 'Content-Type': 'application/json'},
                body: JSON.stringify({title}),
            });
            input.value = '';
            await loadTasks();
        } finally {
            input.disabled = false;
            input.focus();
        }
    });

    loadTasks();
    window.addEventListener('focus', loadTasks);
    setInterval(loadTasks, 60000);
})();
</script>
{% endblock %}
