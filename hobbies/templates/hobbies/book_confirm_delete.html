{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-gray-800 rounded-2xl shadow p-8 text-center">
        {% if book.cover_url %}
        <img src="{{ book.cover_url }}" alt="{{ book.title }}" class="w-24 rounded-lg shadow mx-auto mb-4">
        {% endif %}
        <h2 class="text-xl font-bold text-white mb-1">Delete this book?</h2>
        <p class="text-gray-300 font-semibold">{{ book.title }}</p>
        {% if book.author %}
        <p class="text-gray-400 text-sm mb-6">{{ book.author }}</p>
        {% endif %}
        <p class="text-gray-500 text-sm mb-6">This action cannot be undone.</p>
        <form method="post" class="flex gap-4 justify-center">
            {% csrf_token %}
            <a href="{% url 'reading_list' %}"
                class="bg-gray-700 hover:bg-gray-600 text-white px-6 py-2 rounded-lg transition">Cancel</a>
            <button type="submit"
                class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg transition">Delete</button>
        </form>
    </div>
</div>
{% endblock %}
