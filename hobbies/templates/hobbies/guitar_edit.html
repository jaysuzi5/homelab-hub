{% extends "base.html" %}
{% block content %}

<div class="max-w-lg mx-auto">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-3xl font-semibold">Edit Guitar Session</h2>
        <a href="{% url 'guitar_history' %}" class="text-gray-400 hover:text-white text-sm">← Back</a>
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="mb-4 text-sm text-red-400 bg-red-900/30 rounded-lg px-4 py-2">{{ message }}</div>
    {% endfor %}
    {% endif %}

    <div class="bg-gray-800 rounded-2xl shadow p-6">
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-1">Date</label>
                <input type="date" name="date" value="{{ entry.date|date:'Y-m-d' }}" required
                    class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-1">Time</label>
                <input type="time" name="time" value="{{ entry.time|time:'H:i' }}" required
                    class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-1">Category</label>
                <select name="category" required
                    class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    {% for val, label in category_choices %}
                    <option value="{{ val }}" {% if entry.category == val %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-1">Duration (minutes)</label>
                <input type="number" name="duration" min="1" max="999" value="{{ entry.duration }}" required
                    class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <label class="block text-gray-400 text-sm mb-1">Description <span class="text-gray-500">(optional)</span></label>
                <input type="text" name="description" maxlength="500" value="{{ entry.description }}"
                    class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-400 text-sm mb-2">Skills <span class="text-gray-500">(optional)</span></label>
                <div class="flex flex-wrap gap-4">
                    {% for field, label, checked in skill_fields_with_state %}
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="{{ field }}"
                            {% if checked %}checked{% endif %}
                            class="w-4 h-4 rounded accent-blue-500">
                        <span class="text-gray-200 text-sm">{{ label }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
            <div class="flex gap-3">
                <button type="submit"
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
                    Save Changes
                </button>
                <a href="{% url 'guitar_history' %}"
                    class="flex-1 text-center bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 rounded-lg transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
