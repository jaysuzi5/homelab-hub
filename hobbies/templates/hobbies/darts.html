{% extends "base.html" %}
{% block content %}

<div class="flex items-center justify-between mb-6">
    <h2 class="text-3xl font-semibold">Darts</h2>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <div class="bg-gray-800 rounded-2xl shadow p-6" style="min-height: 24rem;">
        <h3 class="text-xl font-bold mb-4">501 Single Out - Average 3 Dart Score</h3>
        <div class="w-full h-72">
            <canvas id="dartChart501" class="w-full h-full"></canvas>
        </div>
    </div>

    <div class="bg-gray-800 rounded-2xl shadow p-6" style="min-height: 24rem;">
        <h3 class="text-xl font-bold mb-4">Score Training - Average 3 Dart Score</h3>
        <div class="w-full h-72">
            <canvas id="dartChartScoreTraining" class="w-full h-full"></canvas>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script>
function renderDartChart(canvasId, scores) {
    const barColors = scores.map(score => {
        if (score < 34.5) return 'rgba(239,68,68,0.8)';
        if (score < 49.5) return 'rgba(234,179,8,0.8)';
        return 'rgba(34,197,94,0.8)';
    });

    const ctx = document.getElementById(canvasId).getContext('2d');
    return new Chart(ctx, {
        type: 'bar',
        data: {
            labels: scores.map(() => ''),
            datasets: [{
                label: 'Avg 3 Dart Score',
                data: scores,
                backgroundColor: barColors,
                borderColor: barColors.map(c => c.replace('0.8', '1')),
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { ticks: { display: false }, grid: { drawTicks: false, drawBorder: false } },
                y: { title: { display: true, text: 'Average 3 Dart Score' }, beginAtZero: true }
            },
            plugins: {
                legend: { display: false },
                tooltip: { enabled: true },
                datalabels: { enabled: false }
            }
        }
    });
}

const avgScores501 = {{ dart_avg_scores_501|safe }};
const avgScoreScoreTraining = {{ dart_avg_scores_score_training|safe }};
renderDartChart('dartChart501', avgScores501);
renderDartChart('dartChartScoreTraining', avgScoreScoreTraining);
</script>
{% endblock %}
